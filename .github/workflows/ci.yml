name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-audit:
    name: Security — dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
        cache-dependency-path: ./package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Dependency audit
      run: npm run audit:ci

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-audit

    steps:
    - uses: actions/checkout@v4

    - name: Build backend image
      run: docker build -f backend/Dockerfile -t erp-backend:ci .

    - name: Build frontend image
      run: docker build -f frontend/Dockerfile -t erp-frontend:ci --build-arg NEXT_PUBLIC_API_URL=http://localhost:3000 .

  backend-tests:
    name: Backend — Jest unit & API e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-audit

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
        cache-dependency-path: ./package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate
      working-directory: ./backend

    - name: Backend CI checks
      run: npm run ci:check:backend

    - name: Apply Migrations
      run: npm run migrate

    - name: Backend API e2e tests
      run: npm run test:e2e:backend

  frontend-checks:
    name: Frontend — Vitest, lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: security-audit

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
        cache-dependency-path: ./package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Frontend CI checks
      run: npm run ci:check:frontend

  frontend-e2e:
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [security-audit, backend-tests, frontend-checks, docker-build]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      PLAYWRIGHT_BASE_URL: "http://localhost:3001"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      E2E_EMAIL: "manager@branchbrew.dev"
      E2E_PASSWORD: "password123"

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: npm
        cache-dependency-path: ./package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

    - name: Install Playwright browser
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium
      working-directory: ./frontend

    - name: Install Playwright OS dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
      working-directory: ./frontend

    - name: Generate Prisma Client
      run: npx prisma generate
      working-directory: ./backend

    - name: Apply Migrations
      run: npm run migrate

    - name: Seed Database
      run: npm run db:seed

    - name: Build Backend
      run: npm run build --workspace=backend

    - name: Start Backend
      run: |
        node backend/dist/src/main.js &
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3000/health > /dev/null; then
            echo "Backend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Backend failed to start"
        exit 1

    - name: Build Frontend
      run: NEXT_PUBLIC_API_URL=http://localhost:3000 npm run build --workspace=frontend

    - name: Start Frontend
      run: |
        npm run start --workspace=frontend -- -p 3001 &
        for i in $(seq 1 60); do
          if curl -sf http://localhost:3001/login > /dev/null; then
            echo "Frontend ready"
            exit 0
          fi
          sleep 2
        done
        echo "Frontend failed to start"
        exit 1

    - name: Playwright smoke tests
      run: npm run test:e2e:frontend
