name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'infra/**'
            root:
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'packages/**'
              - '.github/workflows/ci.yml'

  security-audit:
    name: Security — dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Dependency audit
        run: npm run audit:ci

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-audit, changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t erp-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t erp-frontend:ci --build-arg NEXT_PUBLIC_API_URL=http://localhost:3000 .

  backend-tests:
    name: Backend — Jest unit & API e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-audit, changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.root == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./backend

      - name: Verify generated enums are up to date
        run: |
          node scripts/generate-enums.mjs
          git diff --exit-code packages/types/src/enums.ts

      - name: Export OpenAPI spec
        run: npm run openapi:export --workspace=backend

      - name: Verify OpenAPI spec is up to date
        run: git diff --exit-code backend/openapi.json

      - name: Backend CI checks
        run: npm run ci:check --workspace=backend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

      - name: Apply Migrations
        run: npm run migrate

      - name: Backend API e2e tests
        run: npm run test:e2e:backend

  frontend-checks:
    name: Frontend — Vitest, lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-audit, changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Verify generated API types are up to date
        run: |
          npm run generate:api --workspace=frontend
          git diff --exit-code frontend/src/types/generated/api.d.ts

      - name: Frontend CI checks
        run: npm run ci:check --workspace=frontend

      - name: Verify frontend production build
        run: test -f frontend/.next/BUILD_ID

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  frontend-e2e:
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [security-audit, changes, backend-tests, frontend-checks]
    if: >-
      always() &&
      needs.security-audit.result == 'success' &&
      needs.backend-tests.result != 'failure' &&
      needs.frontend-checks.result != 'failure' &&
      (
        github.ref == 'refs/heads/main' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.root == 'true'
      )

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      PLAYWRIGHT_BASE_URL: "http://localhost:3001"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      E2E_EMAIL: "manager@branchbrew.dev"
      E2E_PASSWORD: "password123"

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Restore node_modules cache
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci --prefer-offline

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Download backend build artifact
        if: needs.backend-tests.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Build Backend
        if: needs.backend-tests.result != 'success'
        run: npm run build --workspace=backend

      - name: Download frontend build artifact
        if: needs.frontend-checks.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next

      - name: Ensure frontend production build
        run: |
          if [ ! -f frontend/.next/BUILD_ID ]; then
            echo "frontend/.next/BUILD_ID missing — running production build"
            NEXT_PUBLIC_API_URL=http://localhost:3000 npm run build --workspace=frontend
          fi
          test -f frontend/.next/BUILD_ID

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./backend

      - name: Apply Migrations
        run: npm run migrate

      - name: Seed Database
        run: npm run db:seed

      - name: Start Backend
        run: |
          node backend/dist/src/main.js &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Start Frontend
        run: |
          npm run start --workspace=frontend -- -p 3001 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/login > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      - name: Playwright smoke tests
        run: npm run test:e2e:frontend
