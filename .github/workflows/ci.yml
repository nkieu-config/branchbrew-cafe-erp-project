name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Path filter
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
      root: ${{ steps.filter.outputs.root }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'backend/Dockerfile'
              - 'frontend/Dockerfile'
              - 'infra/**'
            root:
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/**'
              - 'packages/**'
              - '.github/workflows/**'

  security-audit:
    name: Security — npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: ./scripts/npm-ci-retry.sh

      - name: Dependency audit
        run: npm run audit:ci

  docker-build:
    name: Docker — build, scan & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Validate compose configs
        run: |
          JWT_SECRET=test-jwt-secret-for-ci-only-32chars \
          POSTGRES_USER=erp_user \
          POSTGRES_PASSWORD=erp_password \
          POSTGRES_DB=erp_db \
          NEXT_PUBLIC_API_URL=http://localhost:3000 \
          docker compose -f infra/docker-compose.yml config --quiet

          JWT_SECRET=test-jwt-secret-for-ci-only-32chars \
          CORS_ORIGIN=https://example.com \
          DATABASE_URL=postgresql://erp_user:erp_password@db:5432/erp_db?schema=public \
          NEXT_PUBLIC_API_URL=https://example.com \
          POSTGRES_USER=erp_user \
          POSTGRES_PASSWORD=erp_password \
          POSTGRES_DB=erp_db \
          docker compose -f infra/docker-compose.prod.yml config --quiet

          docker compose -f infra/docker-compose.ci-smoke.yml --env-file infra/.env.compose.ci config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (parallel)
        run: ./scripts/docker-ci-build.sh

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: erp-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: usr/local/lib/node_modules/npm,opt/yarn-v1.22.22,usr/local/lib/node_modules/corepack

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: erp-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln
          skip-dirs: usr/local/lib/node_modules/npm,opt/yarn-v1.22.22,usr/local/lib/node_modules/corepack
          skip-setup-trivy: true

      - name: Compose smoke test
        env:
          SKIP_COMPOSE_VALIDATE: "1"
        run: ./scripts/docker-compose-smoke.sh

  backend-tests:
    name: Backend — checks, build & API e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-audit, changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.root == 'true'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: ./scripts/npm-ci-retry.sh

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./backend

      - name: Verify generated enums are up to date
        run: |
          node scripts/generate-enums.mjs
          git diff --exit-code packages/types/src/enums.ts

      - name: Export OpenAPI spec
        run: npm run openapi:export --workspace=backend

      - name: Verify OpenAPI spec is up to date
        run: git diff --exit-code backend/openapi.json

      - name: Backend CI checks
        run: npm run ci:check --workspace=backend

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

      - name: Apply Migrations
        run: npm run migrate

      - name: Backend API e2e tests
        run: npm run test:e2e:backend

  frontend-checks:
    name: Frontend — checks & build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security-audit, changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.root == 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: ./scripts/npm-ci-retry.sh

      - name: Verify generated API types are up to date
        run: |
          npm run generate:api --workspace=frontend
          git diff --exit-code frontend/src/types/generated/api.d.ts

      - name: Frontend CI checks
        run: npm run ci:check --workspace=frontend

      - name: Verify frontend production build
        run: test -f frontend/.next/BUILD_ID

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/.next
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  frontend-e2e:
    name: E2E — Playwright (full stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [security-audit, changes, backend-tests, frontend-checks]
    if: >-
      always() &&
      needs.security-audit.result == 'success' &&
      needs.backend-tests.result != 'failure' &&
      needs.frontend-checks.result != 'failure' &&
      (
        github.ref == 'refs/heads/main' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.root == 'true'
      )

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres"
      JWT_SECRET: "test-jwt-secret-for-ci-only-32chars"
      NEXT_PUBLIC_API_URL: "http://localhost:3000"
      PLAYWRIGHT_BASE_URL: "http://localhost:3001"
      PLAYWRIGHT_SKIP_WEBSERVER: "1"
      E2E_EMAIL: "manager@branchbrew.dev"
      E2E_PASSWORD: "password123"

    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Restore node_modules cache
        uses: actions/cache@v6
        id: npm-cache
        with:
          path: |
            node_modules
            backend/node_modules
            frontend/node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Install Dependencies
        run: ./scripts/npm-ci-retry.sh

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: ./frontend

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: ./frontend

      - name: Download backend build artifact
        if: needs.backend-tests.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: backend-dist
          path: backend/dist

      - name: Build Backend
        if: needs.backend-tests.result != 'success'
        run: npm run build --workspace=backend

      - name: Download frontend build artifact
        if: needs.frontend-checks.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/.next

      - name: Ensure frontend production build
        run: |
          if [ ! -f frontend/.next/BUILD_ID ]; then
            echo "frontend/.next/BUILD_ID missing — running production build"
            NEXT_PUBLIC_API_URL=http://localhost:3000 npm run build --workspace=frontend
          fi
          test -f frontend/.next/BUILD_ID

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./backend

      - name: Apply Migrations
        run: npm run migrate

      - name: Seed Database
        run: npm run db:seed

      - name: Start Backend
        run: |
          node backend/dist/src/main.js &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          exit 1

      - name: Start Frontend
        run: |
          npm run start --workspace=frontend -- -p 3001 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/login > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          exit 1

      - name: Playwright smoke tests
        run: npm run test:e2e:frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
