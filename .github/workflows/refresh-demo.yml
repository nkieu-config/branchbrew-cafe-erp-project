name: Refresh demo data

on:
  schedule:
    - cron: "5 */3 * * *"
  workflow_dispatch: {}

concurrency:
  group: refresh-demo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  reseed:
    name: Reseed the hosted demo database
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 22.x
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: ./scripts/npm-ci-retry.sh

      - name: Generate Prisma client
        run: npx prisma generate --schema=backend/prisma/schema.prisma

      - name: Apply migrations
        run: npm run migrate
        env:
          DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DEMO_DIRECT_URL }}

      - name: Reseed demo data
        run: npm run db:seed
        env:
          DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DEMO_DIRECT_URL }}
          ALLOW_DEMO_SEED: "true"
          DEMO_SEED_CONFIRM: WIPE_DEMO_DATABASE
